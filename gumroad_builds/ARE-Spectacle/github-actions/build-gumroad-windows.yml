name: Build Gumroad Windows Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip wheel
          python -m pip install -r requirements.txt
          python -m pip install nuitka ordered-set zstandard pytest

      - name: Run tests
        shell: pwsh
        run: |
          if (Test-Path "tests") {
            python -m pytest
          } else {
            Write-Host "No tests directory found; skipping."
          }

      - name: Build executable
        shell: pwsh
        run: |
          python -m nuitka `
            --standalone `
            --onefile `
            --assume-yes-for-downloads `
            --include-package=app `
            --include-package=uvicorn `
            --include-package=fastapi `
            --include-package=starlette `
            --output-filename=ARE-Spectacle.exe `
            run_spectacle.py

      - name: Stage Gumroad package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release\ARE-Spectacle-Gumroad | Out-Null
          Copy-Item ARE-Spectacle.exe release\ARE-Spectacle-Gumroad\
          Copy-Item README_START_HERE.txt release\ARE-Spectacle-Gumroad\
          Copy-Item sample_requests.json release\ARE-Spectacle-Gumroad\
          Compress-Archive -Path release\ARE-Spectacle-Gumroad\* -DestinationPath release\ARE-Spectacle-Gumroad.zip -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ARE-Spectacle-Gumroad
          path: release/ARE-Spectacle-Gumroad.zip

      - name: Publish GitHub Release on tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create $env:GITHUB_REF_NAME release\ARE-Spectacle-Gumroad.zip --title "ARE Spectacle $env:GITHUB_REF_NAME" --notes "Windows Gumroad build."
