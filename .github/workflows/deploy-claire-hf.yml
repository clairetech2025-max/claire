name: Deploy CLAIRE Hugging Face Space

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy"
        required: true
        default: "main"
      approve_sdk_transition:
        description: "Approve replacing the current Gradio Space runtime with the packaged Docker runtime"
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: deploy-claire-hf
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out CLAIRE
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          path: claire

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Capture source revision
        working-directory: claire
        run: |
          echo "CLAIRE_SOURCE_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          echo "CLAIRE_SOURCE_REF=${{ inputs.ref }}" >> "$GITHUB_ENV"

      - name: Install deployment dependencies
        working-directory: claire
        run: |
          python -m pip install --upgrade pip
          python -m pip install "huggingface_hub[cli]"

      - name: Build and validate Space tree
        working-directory: claire
        run: |
          python scripts/deploy/build_hf_tree.py deploy/huggingface/claire.manifest.json /tmp/claire-hf-build
          python scripts/deploy/validate_hf_tree.py /tmp/claire-hf-build
          python scripts/deploy/preflight_hf_space.py deploy/huggingface/claire.manifest.json /tmp/claire-hf-build --skip-remote

      - name: Smoke import
        working-directory: claire
        run: |
          python -m pip install -r /tmp/claire-hf-build/requirements.txt
          cd /tmp/claire-hf-build
          PYTHONPATH=/tmp/claire-hf-build python - <<'PY'
          from claire_core.runtime.health import core_health
          import app

          assert app.app is not None
          assert core_health()["status"] == "AVAILABLE"
          PY

      - name: Upload to Hugging Face
        working-directory: claire
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_APPROVE_SDK_TRANSITION: ${{ inputs.approve_sdk_transition }}
        run: |
          if [ -z "${HF_TOKEN:-}" ]; then
            echo "HF_TOKEN secret is required" >&2
            exit 2
          fi
          PATH="$HOME/.local/bin:$PATH" scripts/deploy/upload_hf_space.sh \
            deploy/huggingface/claire.manifest.json \
            /tmp/claire-hf-build \
            "Deploy CLAIRE mirror from GitHub ${CLAIRE_SOURCE_SHA}"

      - name: Wait for Space health
        working-directory: claire
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          PATH="$HOME/.local/bin:$PATH" python scripts/deploy/hf_wait_for_space.py \
            deploy/huggingface/claire.manifest.json \
            --timeout 900 \
            --interval 15 \
            --expected-source-sha "${CLAIRE_SOURCE_SHA}" \
            --expected-source-ref "${CLAIRE_SOURCE_REF}"

      - name: Smoke deployed CLAIRE Space
        working-directory: claire
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          PATH="$HOME/.local/bin:$PATH" python scripts/deploy/hf_smoke_space.py \
            deploy/huggingface/claire.manifest.json \
            --application claire \
            --expected-source-sha "${CLAIRE_SOURCE_SHA}" \
            --expected-source-ref "${CLAIRE_SOURCE_REF}"
