name: Deploy CLAIRE Hugging Face Space

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy"
        required: true
        default: "codex/claire-core-completion-20260718"

permissions:
  contents: read

concurrency:
  group: deploy-claire-hf
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out CLAIRE
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          path: claire

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deployment dependencies
        working-directory: claire
        run: |
          python -m pip install --upgrade pip
          python -m pip install "huggingface_hub[cli]"

      - name: Build and validate Space tree
        working-directory: claire
        run: |
          python scripts/deploy/build_hf_tree.py deploy/huggingface/claire.manifest.json /tmp/claire-hf-build
          python scripts/deploy/validate_hf_tree.py /tmp/claire-hf-build

      - name: Smoke import
        working-directory: claire
        run: |
          python -m pip install -r /tmp/claire-hf-build/requirements.txt
          cd /tmp/claire-hf-build
          PYTHONPATH=/tmp/claire-hf-build python - <<'PY'
          from claire_core.runtime.health import core_health
          import app

          assert app.app is not None
          assert core_health()["status"] == "AVAILABLE"
          PY

      - name: Upload to Hugging Face
        working-directory: claire
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "${HF_TOKEN:-}" ]; then
            echo "HF_TOKEN secret is required" >&2
            exit 2
          fi
          PATH="$HOME/.local/bin:$PATH" scripts/deploy/upload_hf_space.sh \
            deploy/huggingface/claire.manifest.json \
            /tmp/claire-hf-build \
            "Deploy CLAIRE mirror from GitHub ${GITHUB_SHA}"
